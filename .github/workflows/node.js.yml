name: CI/CD Pipeline - Entrega Final
on:
  push:
    branches: [ "main" ]
env:
  REGISTRY: ghcr.io
  IMAGE_NAME: 113012davidt/gpds
jobs:
  # 1. Fase de Calidad: Filtro SAST con SonarQube
  quality:
    name: Análisis SonarQube
    runs-on: ubuntu-latest
    steps:
      - name: Clonación del repositorio
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
      - name: Ejecución de SonarQube Scan
        uses: sonarsource/sonarqube-scan-action@master
        with:
          args: >
            -Dsonar.projectKey=mi-proyecto-gestion-sw
            -Dsonar.qualitygate.wait=true
        env:
          SONAR_TOKEN: ${{ secrets.SONAR_TOKEN }}
          SONAR_HOST_URL: ${{ secrets.SONAR_HOST_URL }}

  # 2. Fase de Rendimiento: Prueba de carga con K6
  performance:
    name: Prueba de Carga K6
    needs: quality
    runs-on: ubuntu-latest
    steps:
      - name: Clonación del repositorio
        uses: actions/checkout@v4
      - name: Run k6 test
        uses: grafana/k6-action@v0.3.1
        with:
          filename: performance-test.js

  # 3. Fase de Construcción y Despliegue Automático
  build-and-deploy:
    name: Build Docker & Deploy SSH
    needs: performance
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write
    steps:
      - name: Clonación del repositorio
        uses: actions/checkout@v4

      - name: Log in to GitHub Container Registry
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build and push Docker image
        uses: docker/build-push-action@v5
        with:
          context: .
          push: true
          tags: ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}:latest

      - name: Deploy to Server via SSH
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.SERVER_HOST }}
          port: 22
          username: ${{ secrets.SERVER_USER }}
          key: ${{ secrets.SSH_PRIVATE_KEY }}
          proxy_host: ${{ secrets.PROXY_HOST }}
          proxy_port: 22
          proxy_username: ${{ secrets.SERVER_USER }}
          proxy_key: ${{ secrets.SSH_PRIVATE_KEY }}
          timeout: 60s
          proxy_timeout: 60s
          script: |
            echo ${{ secrets.GITHUB_TOKEN }} | docker login ghcr.io -u ${{ github.actor }} --password-stdin
            docker stop my-node-app || true
            docker rm my-node-app || true
            docker pull ghcr.io/113012davidt/gpds:latest
            docker run -d \
              --name my-node-app \
              -p 3000:3000 \
              --restart always \
              ghcr.io/113012davidt/gpds:latest
