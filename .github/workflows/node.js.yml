name: CI/CD Pipeline - Observabilidad Completa

on:
  push:
    branches: [ "main" ]

env:
  REGISTRY: ghcr.io
  IMAGE_NAME: 113012davidt/gpds

jobs:
  # --- ETAPA 1: ANÁLISIS DE CALIDAD (SonarQube) ---
  sonarqube:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
      - name: SonarQube Scan
        uses: sonarsource/sonarqube-scan-action@master
        env:
          SONAR_TOKEN: ${{ secrets.SONAR_TOKEN }}
          SONAR_HOST_URL: ${{ secrets.SONAR_HOST_URL }}

  # --- ETAPA 2: PRUEBA DE RENDIMIENTO (K6) ---
  performance-test:
    needs: sonarqube
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
      - name: Run k6 test
        uses: grafana/k6-action@v0.3.1
        with:
          filename: performance-test.js

  # --- ETAPA 3: EMPAQUETADO (Docker) ---
  build-and-push:
    needs: performance-test
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}
      - name: Build and push
        uses: docker/build-push-action@v5
        with:
          context: .
          push: true
          tags: ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}:latest

  # --- ETAPA 4: DESPLIEGUE (CD con Docker Compose y Proxy Jump) ---
  deploy:
    needs: build-and-push
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      # 1. ENVIAR ARCHIVOS DE CONFIGURACIÓN (YML) AL SERVIDOR
      - name: Copy config files via SCP
        uses: appleboy/scp-action@v0.1.7
        with:
          host: ${{ secrets.SERVER_HOST }} # El Bastion/Nginx
          username: ${{ secrets.SERVER_USER }}
          key: ${{ secrets.SSH_PRIVATE_KEY }}
          # Salto al destino interno
          proxy_host: ${{ secrets.DOCKER_SERVER_IP }}
          proxy_username: ${{ secrets.SERVER_USER }}
          proxy_key: ${{ secrets.SSH_PRIVATE_KEY }}
          source: "docker-compose.yml,prometheus.yml"
          target: "~/monitoring"

      # 2. EJECUTAR DESPLIEGUE MULTI-CONTENEDOR
      - name: Deploy via SSH Proxy Jump
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.DOCKER_SERVER_IP }}
          username: ${{ secrets.SERVER_USER }}
          key: ${{ secrets.SSH_PRIVATE_KEY }}
          proxy_host: ${{ secrets.SERVER_HOST }}
          proxy_username: ${{ secrets.SERVER_USER }}
          proxy_key: ${{ secrets.SSH_PRIVATE_KEY }}
          timeout: 120s
          script: |
            mkdir -p ~/monitoring
            cd ~/monitoring
            
            # Login en GHCR
            echo "${{ secrets.GITHUB_TOKEN }}" | docker login ghcr.io -u ${{ github.actor }} --password-stdin
            
            # Actualizar y levantar el stack de observabilidad
            docker-compose down || true
            docker-compose pull
            docker-compose up -d
            
            echo "Pipeline completado: App, Prometheus y Grafana están activos."
