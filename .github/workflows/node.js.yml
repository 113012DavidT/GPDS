name: CI Pipeline - Análisis SAST con SonarQube

on:
  push:
    branches: [ "main" ]
  pull_request:
    branches: [ "main" ]

jobs:
  test:
    name: Ejecución de Pruebas Unitarias (Jest)
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
      
      - name: Use Node.js 20.x
        uses: actions/setup-node@v4
        with:
          node-version: '20.x'
          cache: 'npm'

      - name: Install dependencies
        run: npm install

      - name: Run Jest tests
        # Mantenemos el || true por si quieres que Sonar analice aunque falle un test
        run: npm test || true 

  sonarqube-analysis:
    name: Análisis de Calidad de Código (SAST)
    needs: test
    runs-on: ubuntu-latest
    steps:
      - name: Clonación del repositorio (Checkout)
        uses: actions/checkout@@v4
        with:
          fetch-depth: 0 
          
      - name: Ejecución de Escáner SonarQube
        uses: sonarsource/sonarqube-scan-action@master
        with:
          args: >
            -Dsonar.projectKey=mi-proyecto-gestion-sw
            -Dsonar.sources=.
            -Dsonar.javascript.lcov.reportPaths=coverage/lcov.info
            -Dsonar.qualitygate.wait=true
        env:
          SONAR_TOKEN: ${{ secrets.SONAR_TOKEN }}
          SONAR_HOST_URL: ${{ secrets.SONAR_HOST_URL }}
