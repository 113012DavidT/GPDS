name: CI/CD Pipeline - Laboratorio Observabilidad Final

on:
  push:
    branches: [ "main" ]

env:
  REGISTRY: ghcr.io
  IMAGE_NAME: 113012davidt/gpds

jobs:
  # --- ETAPA 1: CALIDAD (SonarQube) ---
  sonarqube:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
      - name: SonarQube Scan
        uses: sonarsource/sonarqube-scan-action@master
        env:
          SONAR_TOKEN: ${{ secrets.SONAR_TOKEN }}
          SONAR_HOST_URL: ${{ secrets.SONAR_HOST_URL }}

  # --- ETAPA 2: RENDIMIENTO (K6) ---
  performance-test:
    needs: sonarqube
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Run k6 test
        uses: grafana/k6-action@v0.3.1
        with:
          filename: performance-test.js

  # --- ETAPA 3: EMPAQUETADO (Docker) ---
  build-and-push:
    needs: performance-test
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write
    steps:
      - uses: actions/checkout@v4
      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}
      - name: Build and push
        uses: docker/build-push-action@v5
        with:
          context: .
          push: true
          tags: ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}:latest

  # --- ETAPA 4: DESPLIEGUE FINAL ---
  deploy:
    needs: build-and-push
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
      - name: Deploy via SSH Proxy Jump
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.DOCKER_SERVER_IP }}     # IP INTERNA: 10.0.1.4
          username: ${{ secrets.SERVER_USER }}      # davidtovarangel
          key: ${{ secrets.SSH_PRIVATE_KEY }}       # Tu llave privada ED25519
          proxy_host: ${{ secrets.SERVER_HOST }}    # IP PÚBLICA BASTION: 34.132.44.63
          proxy_username: ${{ secrets.SERVER_USER }}
          proxy_key: ${{ secrets.SSH_PRIVATE_KEY }}
          timeout: 180s
          script: |
            mkdir -p ~/monitoring
            cd ~/monitoring
            
            # Login al registro
            echo "${{ secrets.GITHUB_TOKEN }}" | docker login ghcr.io -u ${{ github.actor }} --password-stdin
            
            # 1. Configuración de Prometheus
            cat <<EOF > prometheus.yml
            global:
              scrape_interval: 10s
            scrape_configs:
              - job_name: 'servidor'
                static_configs:
                  - targets: ['node-exporter:9100']
              - job_name: 'aplicacion_nodejs'
                static_configs:
                  - targets: ['app-node:3000']
            EOF

            # 2. Configuración de Nginx como Proxy Inverso (REQUISITO: PROXY CON NGINX)
            cat <<EOF > nginx.conf
            events {}
            http {
                server {
                    listen 80;
                    # Proxy para la Aplicación Node.js
                    location / {
                        proxy_pass http://app-node:3000;
                        proxy_set_header Host \$host;
                        proxy_set_header X-Real-IP \$remote_addr;
                    }
                    # Proxy para Grafana
                    location /grafana/ {
                        proxy_pass http://grafana:3000/;
                        proxy_set_header Host \$host;
                    }
                }
            }
            EOF

            # 3. Docker Compose (Versión 3.3 para compatibilidad con tu servidor)
            cat <<EOF > docker-compose.yml
            version: '3.3'
            services:
              app-node:
                image: ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}:latest
                container_name: app-node
                restart: always

              nginx-proxy:
                image: nginx:alpine
                container_name: nginx-proxy
                ports:
                  - "80:80"
                volumes:
                  - ./nginx.conf:/etc/nginx/nginx.conf:ro
                depends_on:
                  - app-node
                restart: always

              node-exporter:
                image: prom/node-exporter:latest
                container_name: node-exporter
                volumes:
                  - /proc:/host/proc:ro
                  - /sys:/host/sys:ro
                  - /:/rootfs:ro
                command:
                  - '--path.procfs=/host/proc'
                  - '--path.rootfs=/rootfs'
                  - '--path.sysfs=/host/sys'
                restart: always

              prometheus:
                image: prom/prometheus:latest
                container_name: prometheus
                volumes:
                  - ./prometheus.yml:/etc/prometheus/prometheus.yml
                restart: always

              grafana:
                image: grafana/grafana:latest
                container_name: grafana
                environment:
                  - GF_SECURITY_ADMIN_PASSWORD=admin
                  - GF_SERVER_ROOT_URL=%(protocol)s://%(domain)s:%(http_port)s/grafana/
                  - GF_SERVER_SERVE_FROM_SUB_PATH=true
                depends_on:
                  - prometheus
                restart: always
            EOF

            # Despliegue con estrategia "Recreate"
            docker-compose down || true
            docker-compose pull
            docker-compose up -d --force-recreate
