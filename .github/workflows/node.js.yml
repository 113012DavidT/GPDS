name: CI/CD Pipeline - Entrega Final

on:
  push:
    branches: [ "main" ]

env:
  REGISTRY: ghcr.io
  # Nombre en minúsculas para cumplir con las reglas de Docker
  IMAGE_NAME: 113012davidt/gpds

jobs:
  # 1. ETAPA: Análisis de Calidad (SonarQube)
  quality-analysis:
    name: Análisis Estático (SonarQube)
    runs-on: ubuntu-latest
    steps:
      - name: Checkout del repositorio
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Ejecución de SonarQube Scan
        uses: SonarSource/sonarqube-scan-action@master
        env:
          SONAR_TOKEN: ${{ secrets.SONAR_TOKEN }}
          SONAR_HOST_URL: ${{ secrets.SONAR_HOST_URL }}
        with:
          args: >
            -Dsonar.projectKey=mi-proyecto-gestion-sw
            -Dsonar.sources=.
            -Dsonar.qualitygate.wait=true

  # 2. ETAPA: Prueba de Rendimiento (K6)
  performance-test:
    name: Pruebas de Carga (K6)
    needs: quality-analysis
    runs-on: ubuntu-latest
    steps:
      - name: Checkout del repositorio
        uses: actions/checkout@v4

      - name: Ejecución de k6
        uses: grafana/k6-action@v0.3.1
        with:
          filename: performance-test.js

  # 3. ETAPA: Empaquetado (Docker Build)
  build-and-push:
    name: Empaquetado en Docker y GHCR
    needs: performance-test
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write
    steps:
      - name: Checkout del repositorio
        uses: actions/checkout@v4

      - name: Login en GitHub Container Registry
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Construir y Subir Imagen
        uses: docker/build-push-action@v5
        with:
          context: .
          push: true
          tags: ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}:latest

  # 4. ETAPA: Despliegue Automático (CD)
  deploy:
    name: Despliegue en Servidor Cloud
    needs: build-and-push
    runs-on: ubuntu-latest
    steps:
      - name: Despliegue vía SSH
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.SERVER_HOST }}
          username: ${{ secrets.SERVER_USER }}
          key: ${{ secrets.SSH_PRIVATE_KEY }}
          port: 22
          timeout: 60s
          script: |
            # Usamos sudo para evitar el error 'command not found' y problemas de permisos
            echo ${{ secrets.GITHUB_TOKEN }} | sudo docker login ghcr.io -u 113012davidt --password-stdin
            
            # Detener y eliminar el contenedor actual si existe
            sudo docker stop my-node-app || true
            sudo docker rm my-node-app || true
            
            # Limpiar imágenes antiguas para no llenar el disco
            sudo docker image prune -f
            
            # Descargar la versión más reciente de la imagen
            sudo docker pull ghcr.io/113012davidt/gpds:latest
            
            # Levantar el nuevo contenedor
            sudo docker run -d \
              --name my-node-app \
              -p 3000:3000 \
              --restart always \
              ghcr.io/113012davidt/gpds:latest
