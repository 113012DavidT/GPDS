name: CI/CD Pipeline - Entrega Final

on:
  push:
    branches: [ "main" ]

env:
  REGISTRY: ghcr.io
  IMAGE_NAME: 113012davidt/gpds

jobs:
  quality-analysis:
    name: Análisis SonarQube
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
      - name: SonarQube Scan
        uses: SonarSource/sonarqube-scan-action@master
        env:
          SONAR_TOKEN: ${{ secrets.SONAR_TOKEN }}
          SONAR_HOST_URL: ${{ secrets.SONAR_HOST_URL }}
        with:
          args: >
            -Dsonar.projectKey=mi-proyecto-gestion-sw
            -Dsonar.qualitygate.wait=true

  performance-test:
    name: Pruebas K6
    needs: quality-analysis
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Run k6
        uses: grafana/k6-action@v0.3.1
        with:
          filename: performance-test.js

  build-and-push:
    name: Docker Build
    needs: performance-test
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write
    steps:
      - uses: actions/checkout@v4
      - name: Login to GHCR
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}
      - name: Build and Push
        uses: docker/build-push-action@v5
        with:
          context: .
          push: true
          tags: ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}:latest

  deploy:
    name: Despliegue vía Proxy (Nginx a Docker)
    needs: build-and-push
    runs-on: ubuntu-latest
    steps:
      - name: Deploy via SSH Proxy
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.SERVER_HOST }}       # IP de NGINX (la .47)
          username: ${{ secrets.SERVER_USER }}
          key: ${{ secrets.SSH_PRIVATE_KEY }}
          # CONFIGURACIÓN DEL SALTO INTERNO:
          proxy_host: ${{ secrets.DOCKER_SERVER_IP }} # IP PRIVADA del servidor Docker
          proxy_username: ${{ secrets.SERVER_USER }}
          proxy_key: ${{ secrets.SSH_PRIVATE_KEY }}
          script: |
            # Estos comandos se ejecutarán en el SERVIDOR DOCKER después de saltar por Nginx
            echo ${{ secrets.GITHUB_TOKEN }} | docker login ghcr.io -u 113012davidt --password-stdin
            docker stop my-node-app || true
            docker rm my-node-app || true
            docker pull ghcr.io/113012davidt/gpds:latest
            docker run -d --name my-node-app -p 3000:3000 --restart always ghcr.io/113012davidt/gpds:latest
