name: Pipeline de Control de Calidad y Despliegue Automático

on:
  push:
    branches: [ "main" ]

env:
  REGISTRY: ghcr.io
  IMAGE_NAME: 113012davidt/gpds

jobs:
  quality-analysis:
    name: Análisis Estático (SonarQube)
    runs-on: ubuntu-latest
    steps:
      - name: Checkout del repositorio
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
      - name: SonarQube Scan
        uses: SonarSource/sonarqube-scan-action@master
        env:
          SONAR_TOKEN: ${{ secrets.SONAR_TOKEN }}
          SONAR_HOST_URL: ${{ secrets.SONAR_HOST_URL }}
        with:
          args: >
            -Dsonar.projectKey=mi-proyecto-gestion-sw
            -Dsonar.sources=.

  performance-test:
    name: Pruebas de Carga (K6)
    needs: quality-analysis
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
      - name: k6
        uses: grafana/k6-action@v0.3.1
        with:
          filename: performance-test.js

  build-and-push:
    name: Build Docker Image
    needs: performance-test
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write
    steps:
      - name: Checkout
        uses: actions/checkout@v4
      - name: Login to GHCR
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}
      - name: Build and Push
        uses: docker/build-push-action@v5
        with:
          context: .
          push: true
          tags: ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}:latest

  deploy:
    name: Despliegue en Servidor
    needs: build-and-push
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
      - name: SSH Deploy
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.DOCKER_SERVER_IP }}
          username: ${{ secrets.SERVER_USER }}
          key: ${{ secrets.SSH_PRIVATE_KEY }}
          proxy_host: ${{ secrets.SERVER_HOST }}
          proxy_username: ${{ secrets.SERVER_USER }}
          proxy_key: ${{ secrets.SSH_PRIVATE_KEY }}
          script: |
            mkdir -p ~/monitoring
            cd ~/monitoring
            echo "${{ secrets.GITHUB_TOKEN }}" | docker login ghcr.io -u ${{ github.actor }} --password-stdin
            
            # Crear prometheus.yml (Configuración Lab)
            cat <<EOF > prometheus.yml
            global:
              scrape_interval: 10s
            scrape_configs:
              - job_name: 'servidor'
                static_configs:
                  - targets: ['node-exporter:9100']
              - job_name: 'aplicacion_nodejs'
                static_configs:
                  - targets: ['app-node:3000']
            EOF

            # Crear docker-compose.yml (Infraestructura Lab)
            cat <<EOF > docker-compose.yml
            version: '3.8'
            services:
              app-node:
                image: ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}:latest
                container_name: app-node
                ports:
                  - "3000:3000"
                restart: always
              node-exporter:
                image: prom/node-exporter:latest
                container_name: node-exporter
                volumes:
                  - /proc:/host/proc:ro
                  - /sys:/host/sys:ro
                  - /:/rootfs:ro
                command:
                  - '--path.procfs=/host/proc'
                  - '--path.rootfs=/rootfs'
                  - '--path.sysfs=/host/sys'
                ports:
                  - "9100:9100"
              prometheus:
                image: prom/prometheus:latest
                container_name: prometheus
                volumes:
                  - ./prometheus.yml:/etc/prometheus/prometheus.yml
                ports:
                  - "9090:9090"
              grafana:
                image: grafana/grafana:latest
                container_name: grafana
                ports:
                  - "3001:3000"
                environment:
                  - GF_SECURITY_ADMIN_PASSWORD=admin
                depends_on:
                  - prometheus
            EOF

            docker-compose down || true
            docker-compose up -d --force-recreate
            docker image prune -f
