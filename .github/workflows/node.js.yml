name: CI/CD Pipeline - Entrega Final

on:
  push:
    branches: [ "main" ]

env:
  REGISTRY: ghcr.io
  IMAGE_NAME: 113012davidt/gpds

jobs:
  # --- ETAPA 1: CALIDAD (SonarQube) ---
  sonarqube:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
      - name: SonarQube Scan
        uses: sonarsource/sonarqube-scan-action@master
        # No usamos continue-on-error porque queremos que funcione sí o sí
        env:
          SONAR_TOKEN: ${{ secrets.SONAR_TOKEN }}
          SONAR_HOST_URL: ${{ secrets.SONAR_HOST_URL }}

  # --- ETAPA 2: RENDIMIENTO (K6) ---
  performance-test:
    needs: sonarqube
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Run k6 test
        uses: grafana/k6-action@v0.3.1
        with:
          filename: performance-test.js

  # --- ETAPA 3: EMPAQUETADO (Docker) ---
  build-and-push:
    needs: performance-test
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write
    steps:
      - uses: actions/checkout@v4
      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}
      - name: Build and push
        uses: docker/build-push-action@v5
        with:
          context: .
          push: true
          tags: ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}:latest

  # --- ETAPA 4: DESPLIEGUE (CD con Observabilidad) ---
  deploy:
    needs: build-and-push
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
      - name: Deploy via SSH Proxy Jump
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.DOCKER_SERVER_IP }}
          username: ${{ secrets.SERVER_USER }}
          key: ${{ secrets.SSH_PRIVATE_KEY }}
          proxy_host: ${{ secrets.SERVER_HOST }}
          proxy_username: ${{ secrets.SERVER_USER }}
          proxy_key: ${{ secrets.SSH_PRIVATE_KEY }}
          timeout: 120s
          script: |
            mkdir -p ~/monitoring
            cd ~/monitoring
            
            # Login en GHCR
            echo "${{ secrets.GITHUB_TOKEN }}" | docker login ghcr.io -u ${{ github.actor }} --password-stdin
            
            # Generar archivos de configuración directo en el server
            cat <<EOF > prometheus.yml
            global:
              scrape_interval: 10s
            scrape_configs:
              - job_name: 'node-app'
                static_configs:
                  - targets: ['app-node:3000']
            EOF

            cat <<EOF > docker-compose.yml
            version: '3.8'
            services:
              app-node:
                image: ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}:latest
                container_name: app-node
                ports:
                  - "3000:3000"
                restart: always

              prometheus:
                image: prom/prometheus:latest
                container_name: prometheus
                volumes:
                  - ./prometheus.yml:/etc/prometheus/prometheus.yml
                ports:
                  - "9090:9090"
                restart: always

              grafana:
                image: grafana/grafana:latest
                container_name: grafana
                ports:
                  - "3001:3000"
                environment:
                  - GF_SECURITY_ADMIN_PASSWORD=admin
                  - GF_SERVER_ROOT_URL=%(protocol)s://%(domain)s:%(http_port)s/grafana/
                  - GF_SERVER_SERVE_FROM_SUB_PATH=true
                depends_on:
                  - prometheus
                restart: always
            EOF

            # Reiniciar stack
            docker-compose down || true
            docker-compose pull
            docker-compose up -d --force-recreate
            
