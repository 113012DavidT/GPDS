name: CI/CD Pipeline - Entrega Final

on:
  push:
    branches: [ "main" ]

env:
  REGISTRY: ghcr.io
  IMAGE_NAME: 113012davidt/gpds

jobs:
  quality:
    name: Análisis SonarQube
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
      - name: SonarQube Scan
        uses: SonarSource/sonarqube-scan-action@master
        env:
          SONAR_TOKEN: ${{ secrets.SONAR_TOKEN }}
          SONAR_HOST_URL: ${{ secrets.SONAR_HOST_URL }}
        with:
          args: >
            -Dsonar.projectKey=mi-proyecto-gestion-sw
            -Dsonar.qualitygate.wait=true

  performance:
    name: Pruebas K6
    needs: quality
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Run k6
        uses: grafana/k6-action@v0.3.1
        with:
          filename: performance-test.js

  build:
    name: Docker Build
    needs: performance
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write
    steps:
      - uses: actions/checkout@v4
      - name: Login to GHCR
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}
      - name: Build and Push
        uses: docker/build-push-action@v5
        with:
          context: .
          push: true
          tags: ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}:latest

  deploy:
    name: Despliegue con Salto Proxy
    needs: build
    runs-on: ubuntu-latest
    steps:
      - name: Deploy via Proxy Jump
        uses: appleboy/ssh-action@v1.0.3
        with:
          # 1. ENTRADA AL PROXY (Servidor Nginx)
          host: ${{ secrets.SERVER_HOST }}
          username: ${{ secrets.SERVER_USER }}
          key: ${{ secrets.SSH_PRIVATE_KEY }}
          port: 22
          
          # 2. SALTO AL DESTINO (Servidor Docker Privado)
          proxy_host: ${{ secrets.DOCKER_SERVER_IP }}
          proxy_username: ${{ secrets.SERVER_USER }}
          proxy_key: ${{ secrets.SSH_PRIVATE_KEY }}
          proxy_port: 22
          
          # 3. AJUSTES DE TIEMPO
          timeout: 60s
          proxy_timeout: 60s
          
          # 4. COMANDOS (Se ejecutan en el servidor Docker)
          script: |
            echo ${{ secrets.GITHUB_TOKEN }} | docker login ghcr.io -u 113012davidt --password-stdin
            docker stop my-node-app || true
            docker rm my-node-app || true
            docker pull ghcr.io/113012davidt/gpds:latest
            docker run -d --name my-node-app -p 3000:3000 --restart always ghcr.io/113012davidt/gpds:latest
