name: CI/CD Pipeline - Laboratorio Observabilidad

on:
  push:
    branches: [ "main" ]

env:
  REGISTRY: ghcr.io
  IMAGE_NAME: 113012davidt/gpds

jobs:
  sonarqube:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
      - name: SonarQube Scan
        uses: sonarsource/sonarqube-scan-action@master
        env:
          SONAR_TOKEN: ${{ secrets.SONAR_TOKEN }}
          SONAR_HOST_URL: ${{ secrets.SONAR_HOST_URL }}

  performance-test:
    needs: sonarqube
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Run k6 test
        uses: grafana/k6-action@v0.3.1
        with:
          filename: performance-test.js

  build-and-push:
    needs: performance-test
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write
    steps:
      - uses: actions/checkout@v4
      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}
      - name: Build and push
        uses: docker/build-push-action@v5
        with:
          context: .
          push: true
          tags: ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}:latest

  deploy:
    needs: build-and-push
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
      - name: Deploy via SSH Proxy Jump
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.DOCKER_SERVER_IP }}
          username: ${{ secrets.SERVER_USER }}
          key: ${{ secrets.SSH_PRIVATE_KEY }}
          proxy_host: ${{ secrets.SERVER_HOST }}
          proxy_username: ${{ secrets.SERVER_USER }}
          proxy_key: ${{ secrets.SSH_PRIVATE_KEY }}
          timeout: 120s
          script: |
            mkdir -p ~/monitoring
            cd ~/monitoring
            
            echo "${{ secrets.GITHUB_TOKEN }}" | docker login ghcr.io -u ${{ github.actor }} --password-stdin
            
            # --- PARTE 2: Configurar Prometheus (Como pide el Laboratorio) ---
            cat <<EOF > prometheus.yml
            global:
              scrape_interval: 10s

            scrape_configs:
              # Trabajo 1: Monitorea el servidor usando Node Exporter
              - job_name: 'servidor'
                static_configs:
                  - targets: ['node-exporter:9100']

              # Trabajo 2: Monitorea el Contenedor (La App Node.js)
              - job_name: 'aplicacion_nodejs'
                static_configs:
                  - targets: ['app-node:3000']
            EOF

            # --- PARTE 3: Docker Compose (Ajustado al Laboratorio) ---
            cat <<EOF > docker-compose.yml
            version: '3.8'

            services:
              # 1. Nuestra Aplicación Web
              app-node:
                image: ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}:latest
                container_name: app-node
                ports:
                  - "3000:3000"
                restart: always

              # 2. Agente de Hardware (CPU, RAM, Disco)
              node-exporter:
                image: prom/node-exporter:latest
                container_name: node-exporter
                volumes:
                  - /proc:/host/proc:ro
                  - /sys:/host/sys:ro
                  - /:/rootfs:ro
                command:
                  - '--path.procfs=/host/proc'
                  - '--path.rootfs=/rootfs'
                  - '--path.sysfs=/host/sys'
                  - '--collector.filesystem.mount-points-exclude=^/(sys|proc|dev|host|etc)($$|/)'
                ports:
                  - "9100:9100"
                restart: always

              # 3. Base de Datos de Métricas
              prometheus:
                image: prom/prometheus:latest
                container_name: prometheus
                volumes:
                  - ./prometheus.yml:/etc/prometheus/prometheus.yml
                ports:
                  - "9090:9090"
                restart: always

              # 4. El Visualizador Gráfico
              grafana:
                image: grafana/grafana:latest
                container_name: grafana
                ports:
                  - "3001:3000"
                environment:
                  - GF_SECURITY_ADMIN_PASSWORD=admin
                  - GF_SERVER_ROOT_URL=%(protocol)s://%(domain)s:%(http_port)s/grafana/
                  - GF_SERVER_SERVE_FROM_SUB_PATH=true
                depends_on:
                  - prometheus
                restart: always
            EOF

            # Ejecutar el despliegue
            docker-compose down || true
            docker-compose pull
            docker-compose up -d --force-recreate
